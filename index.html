<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS CodeBuild Demo</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #141e30, #243b55);
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 120px;
        }

        h1 {
            font-size: 50px;
            color: #00d4ff;
        }

        p {
            font-size: 22px;
            margin-top: 20px;
        }

        .box {
            margin: 40px auto;
            width: 70%;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.5);
        }

        .btn {
            margin-top: 30px;
            padding: 15px 35px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background-color: #00d4ff;
            color: black;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: white;
            transform: scale(1.05);
        }

        footer {
            margin-top: 120px;
            padding: 20px;
            background-color: rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>AWS CodeBuild CI/CD Demo Presented by Sai</h1>

        <div class="box">
            <p>
                This website is deployed automatically using:
            </p>

            <h2>
                GitHub → AWS CodeBuild → Amazon S3
            </h2>

            <p>
                Every time code is pushed to GitHub,
                AWS CodeBuild builds and deploys this website automatically.
            </p>

            <button class="btn">
                DevOps Pipeline Running Successfully
            </button>
        </div>
    </div>

    <footer>
        <p>Created for DevOps CI/CD Practice</p>
    </footer>

</body>
</html>
